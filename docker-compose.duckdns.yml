services:
  duckdns:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      DUCKDNS_DOMAIN: ${DUCKDNS_DOMAIN}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      DUCKDNS_INTERVAL: ${DUCKDNS_INTERVAL:-300}
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache curl >/dev/null
        mkdir -p /var/run/duckdns
        while true; do
          epoch="$(date -u +%s)"
          response="$(curl -fsS "https://www.duckdns.org/update?domains=$$DUCKDNS_DOMAIN&token=$$DUCKDNS_TOKEN&ip=" || true)"
          if [ "$$response" = "OK" ]; then
            echo "$$epoch" > /var/run/duckdns/last_success_epoch
            echo "[duckdns] update OK (epoch=$$epoch)"
          else
            echo "[duckdns] update failed: $${response:-<empty>}" >&2
          fi
          sleep "$${DUCKDNS_INTERVAL:-300}"
        done
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /var/run/duckdns/last_success_epoch && now=$$(date -u +%s) && last=$$(cat /var/run/duckdns/last_success_epoch) && max_age=$$(( $${DUCKDNS_INTERVAL:-300} * 3 )) && [ $$((now-last)) -le $$max_age ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s