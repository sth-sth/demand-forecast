services:
  - type: web
    name: demand-forecast-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: demand-forecast-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://demand-forecast.vercel.app
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: ENVIRONMENT
        value: production

databases:
  - name: demand-forecast-db
