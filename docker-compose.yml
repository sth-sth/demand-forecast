services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forecast}
      POSTGRES_USER: ${POSTGRES_USER:-forecast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forecast}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forecast}:${POSTGRES_PASSWORD:-forecast}@db:5432/${POSTGRES_DB:-forecast}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      UPLOAD_DIR: /app/data/uploads
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/uploads:/app/data/uploads

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
